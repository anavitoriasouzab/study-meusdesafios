<!-- FORMS
 - CAPTURAR DADOS DE ENTRADA
 INPUT -> ENTRADA
 ACTION: Define qual url será enviada os dados, vazio envia para a mesma url 
 method
 - GET
 - POST(envia os dados meio escondido")
enctype="multipart/form-data" ( estou avisando que  neste formulario esta enviando um arquivo)
-->


<form action="" method="get" enctype="multipart/form-data">
    <h1> Digite seu endereço </h1>
    <label>
            Rua:
    <input type="text" name="rua" autocomplete="street-address"
    />
    </label>

     <label>
            Numero:
    <input type="number" name="rua"
    />
    </label>
     <label>
            email:
    <input type="email" name="email"
    />
    </label>
     <label>
            Foto:
    <input type="file" name="arquivo"
    />
    </label>

    <button type="submit"> Enviar dados </button>
        
</form>]


<!-- o button
 type:
 -submit
 -button
 -reset: precisa estar dentro ddo forms (limpa tudo) -->
